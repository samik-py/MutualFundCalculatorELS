server.port=8080
fred.apiKey=${FRED_API_KEY:}
fred.baseUrl=https://api.stlouisfed.org/fred
capm.marketReturn5y=0.10
capm.riskFreeFallback=0.04
capm.expectedReturnFallback=0.10

# H2 in-memory database
spring.datasource.url=jdbc:h2:mem:mfcalculator;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true

# H2 console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT
jwt.secret=default-secret-key-at-least-256-bits-for-hs256-change-in-prod
jwt.expirationMs=86400000
