server.port=8080
fred.apiKey=${FRED_API_KEY:}
fred.baseUrl=https://api.stlouisfed.org/fred
capm.marketReturn5y=0.10
capm.riskFreeFallback=0.04
capm.expectedReturnFallback=0.10
gemini.apiKey=${GEMINI_API_KEY:}
gemini.baseUrl=https://generativelanguage.googleapis.com/v1beta
gemini.model=${GEMINI_MODEL:gemini-2.5-flash}
gemini.timeoutSeconds=20
coinbase.apiBaseUrl=https://api.coinbase.com
coinbase.accessToken=${COINBASE_ACCESS_TOKEN:}
coinbase.oauthClientId=${COINBASE_OAUTH_CLIENT_ID:}
coinbase.oauthRedirectUri=${COINBASE_OAUTH_REDIRECT_URI:http://localhost:5173/crypto}
coinbase.timeoutSeconds=20

# H2 file-backed database for local development persistence across restarts
spring.datasource.url=jdbc:h2:file:./data/mfcalculator
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=never

# H2 console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT
jwt.secret=default-secret-key-at-least-256-bits-for-hs256-change-in-prod
jwt.expirationMs=86400000
